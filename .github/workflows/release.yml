name: Release PhotoStudio setup installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.2.0"
        required: true
        default: "1.0.2.0"
      release_notes:
        description: "Release notes"
        required: false
        default: "PhotoStudio setup installer"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout setup repository
        uses: actions/checkout@v4
        with:
          path: setup-repo

      - name: Checkout PhotoStudio source
        uses: actions/checkout@v4
        with:
          repository: kimothink/PhotoStudio
          path: source

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build setup installer
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $packageUrl = "https://media.githubusercontent.com/media/kimothink/PhotoStudioUpdater/main/PhotoStudio.update.zip"
          .\source\scripts\Build-PhotoStudioRelease.ps1 -Version $version -PackageUrl $packageUrl

      - name: Commit setup installer to repository
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          Copy-Item ".\source\artifacts\installer\PhotoStudioSetup-$version.exe" ".\setup-repo\PhotoStudioSetup-$version.exe" -Force
          Push-Location .\setup-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git lfs install
          git lfs track "*.exe"
          git add .gitattributes "PhotoStudioSetup-$version.exe"
          git commit -m "Release PhotoStudio setup $version" || Write-Host "No setup changes"
          git push
          Pop-Location
